<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 10 - Conversor Celsius a Fahrenheit</title>
    <link rel="stylesheet" href="css/ejercicio10.css">
</head>
<body>

    <div class="contenedor-conversor">
        <h1>Conversor de Temperatura</h1>
        <p class="subtitulo">Convierte grados Celsius a Fahrenheit</p>

        <div class="grupo-formulario">
            <label for="celsius">Temperatura en °C</label>
            <input type="text" id="celsius" placeholder="Ej: 25">
        </div>

        <button type="button" id="btnConvertir" class="boton-convertir">Convertir</button>

        <div class="grupo-formulario">
            <label for="fahrenheit">Temperatura en °F</label>
            <input type="text" id="fahrenheit" readonly placeholder="Resultado">
        </div>

        <p id="mensajeError" class="mensaje-error"></p>
    </div>

    <script src="js/ejercicio10.js"></script>
</body>
</html>
