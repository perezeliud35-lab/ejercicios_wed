<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio12 - MXN a USD</title>
    <link rel="stylesheet" href="css/ejercicio11.css">
</head>
<body>
        <div class="contenedor-conversor">
        <h1>Conversor de MXN</h1>
        <p class="subtitulo">Convierte Pesos Mexicanos a Dolar</p>

        <div class="grupo-formulario">
            <label for="celsius">MXN</label>
            <input type="text" id="celsius" placeholder="Ej: 25">
        </div>

        <button type="button" id="btnConvertir" class="boton-convertir">Convertir</button>

        <div class="grupo-formulario">
            <label for="fahrenheit">USD</label>
            <input type="text" id="fahrenheit" readonly placeholder="Resultado">
        </div>

        <p id="mensajeError" class="mensaje-error"></p>
    </div>

    <script src="js/ejercicio12.js"></script>
    
</body>
</html>
