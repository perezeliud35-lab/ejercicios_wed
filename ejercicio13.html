<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio13 - Verificador de edades</title>
    <link rel="stylesheet" href="css/ejercicio13.css">
</head>
<body>
    <div class="contenedor-conversor">
    <h1>Calculadora de Votación</h1>
    <p class="subtitulo">Verifica si puedes votar según tu edad</p>

    <div class="grupo-formulario">
        <label for="edad">Ingresa tu edad:</label>
        <input type="text" id="edad" placeholder="Ej. 20">
    </div>

    <button id="btnVerificar" class="boton-convertir">Verificar</button>

    <div class="grupo-formulario">
        <label for="resultado">Resultado:</label>
        <input type="text" id="resultado" readonly>
    </div>

    <p id="mensajeError" class="mensaje-error"></p>
</div>

    <script src="js/ejercicio13.js"></script>
    
    
</body>
</html>
