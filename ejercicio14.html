<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 14 - Operaciones con Arreglos</title>
    <link rel="stylesheet" href="css/ejercicio14.css">
</head>
<body>

    <div class="contenedor-conversor">
        <h1>Operaciones con Números</h1>
        <p class="subtitulo">Ingresa varios números separados por comas</p>

        <div class="grupo-formulario">
            <label for="numeros">Números (ej: 10, 20, 30)</label>
            <input type="text" id="numeros" placeholder="Ej: 10, 20, 30, 40, 50">
        </div>

        <button type="button" id="btnCalcular" class="boton-convertir">Calcular</button>

        <div class="grupo-formulario">
            <label for="mayor">Número mayor</label>
            <input type="text" id="mayor" readonly placeholder="Resultado">
        </div>

        <div class="grupo-formulario">
            <label for="menor">Número menor</label>
            <input type="text" id="menor" readonly placeholder="Resultado">
        </div>

        <div class="grupo-formulario">
            <label for="promedio">Promedio</label>
            <input type="text" id="promedio" readonly placeholder="Resultado">
        </div>

        <p id="mensajeError" class="mensaje-error"></p>
    </div>

    <script src="js/ejercicio14.js"></script>
</body>
</html>
