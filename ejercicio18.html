<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 18 - Manipulación del DOM</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/ejercicio18.css">
</head>
<body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">

                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">

                        <h1 class="h3 text-center mb-1">Agregar y Eliminar Elementos</h1>
                        <p class="text-center text-muted mb-4">Manipulación del DOM en vivo</p>

                        <div class="input-group mb-4">
                            <input type="text" id="nuevoElemento" class="form-control" placeholder="Escribe algo">
                            <button id="agregarBtn" class="btn btn-primary" type="button">Agregar</button>
                        </div>

                        <ul id="lista" class="list-group"></ul>

                        <p id="mensajeVacio" class="text-center text-muted mt-3 mb-0">
                            Aún no has agregado ningún elemento.
                        </p>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/ejercicio18.js"></script>
</body>
</html>
